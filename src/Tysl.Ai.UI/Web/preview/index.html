<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preview Host</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #04090f;
  color: #d7e6ff;
  font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
}

body {
  overflow: hidden;
}

#root {
  width: 100%;
  height: 100%;
  position: relative;
  background:
    radial-gradient(circle at top left, rgba(39, 88, 156, 0.32), transparent 34%),
    radial-gradient(circle at bottom right, rgba(10, 38, 78, 0.45), transparent 40%),
    #04090f;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
</head>
<body>
<div id="root">
  <video id="player" autoplay muted playsinline></video>
</div>
<script>
const pageParams = new URLSearchParams(window.location.search);
const root = document.getElementById("root");
let video = document.getElementById("player");

const state = {
  session: null,
  adapter: null,
  ready: false,
  readyTimer: null,
  requestId: null,
  readyCategory: null,
  playbackAttemptId: 0,
  lastStopReason: "none",
  pageMode: pageParams.get("pageMode") || "default",
  fallbackProtocolHint: pageParams.get("fallbackProtocol") || "",
  activeVideo: video,
  webrtc: createWebRtcState()
};

const webRtcReadyEvents = new Set([
  "loadedmetadata",
  "loadeddata",
  "canplay",
  "playing"
]);

function createWebRtcState() {
  return {
    connectionState: "new",
    iceConnectionState: "new",
    hasAudioTrack: false,
    hasVideoTrack: false,
    firstFrameArrived: false
  };
}

function resetWebRtcState() {
  state.webrtc = createWebRtcState();
}

function createReleaseStats(reason) {
  return {
    reason: reason || "none",
    peerClosed: false,
    mediaTracksStopped: 0,
    flvPlayersDisposed: 0,
    hlsPlayersDisposed: 0
  };
}

function post(type, payload = {}) {
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage({ type, payload });
  }
}

function getCurrentAttemptId() {
  return state.playbackAttemptId;
}

function isCurrentAttempt(attemptId) {
  return !attemptId || attemptId === state.playbackAttemptId;
}

function isHlsSupported() {
  return !!(window.Hls && window.Hls.isSupported());
}

function isFlvJsSupported() {
  return !!(window.mpegts && window.mpegts.isSupported());
}

function hasMediaSource() {
  return typeof window.MediaSource !== "undefined";
}

function describeError(error) {
  if (!error) {
    return "unknown error";
  }

  if (typeof error === "string") {
    return error;
  }

  if (error.message && typeof error.message === "string") {
    return error.message;
  }

  try {
    return JSON.stringify(error);
  } catch (_) {
    return String(error);
  }
}

function setActiveVideo(nextVideo) {
  state.activeVideo = nextVideo || null;
  return state.activeVideo;
}

function executePlaybackStep(stepName, attemptId, failureCategory, action) {
  try {
    return action();
  } catch (error) {
    const detail = describeError(error);
    postDiagnostic(`${stepName}_sync_exception`, { detail });
    if (failureCategory) {
      fail(failureCategory, detail, attemptId);
    }

    return null;
  }
}

function trackPromiseRejection(promise, eventName, failureCategory, attemptId) {
  if (!promise || typeof promise.then !== "function") {
    return;
  }

  promise.catch(error => {
    if (!isCurrentAttempt(attemptId)) {
      return;
    }

    const detail = describeError(error);
    postDiagnostic(eventName, { detail });
    if (failureCategory) {
      fail(failureCategory, detail, attemptId);
    }
  });
}

function getVideoSnapshot() {
  const currentVideo = video;
  const error = currentVideo && currentVideo.error ? currentVideo.error : null;
  const currentSrc = currentVideo && currentVideo.currentSrc ? currentVideo.currentSrc : "";
  const srcAttribute = currentVideo && currentVideo.getAttribute("src") ? currentVideo.getAttribute("src") : "";
  return {
    readyState: currentVideo ? currentVideo.readyState : -1,
    networkState: currentVideo ? currentVideo.networkState : -1,
    currentTime: currentVideo && Number.isFinite(currentVideo.currentTime) ? Number(currentVideo.currentTime.toFixed(3)) : 0,
    paused: !!(currentVideo && currentVideo.paused),
    muted: !!(currentVideo && currentVideo.muted),
    ended: !!(currentVideo && currentVideo.ended),
    seeking: !!(currentVideo && currentVideo.seeking),
    videoWidth: currentVideo ? currentVideo.videoWidth || 0 : 0,
    videoHeight: currentVideo ? currentVideo.videoHeight || 0 : 0,
    duration: currentVideo && Number.isFinite(currentVideo.duration) ? Number(currentVideo.duration.toFixed(3)) : String(currentVideo ? currentVideo.duration : 0),
    hasSrc: !!srcAttribute,
    hasSrcObject: !!(currentVideo && currentVideo.srcObject),
    videoIsConnected: !!(currentVideo && currentVideo.isConnected),
    videoInDocument: !!(currentVideo && document.contains(currentVideo)),
    isActiveVideo: currentVideo === state.activeVideo,
    pageMode: state.pageMode,
    fallbackProtocolHint: state.fallbackProtocolHint,
    currentSrc,
    src: srcAttribute || (currentVideo && currentVideo.src ? currentVideo.src : ""),
    srcObjectKind: currentVideo && currentVideo.srcObject ? Object.prototype.toString.call(currentVideo.srcObject) : "",
    crossOrigin: currentVideo && currentVideo.crossOrigin ? currentVideo.crossOrigin : "",
    autoplay: !!(currentVideo && currentVideo.autoplay),
    hlsSupported: isHlsSupported(),
    flvjsSupported: isFlvJsSupported(),
    mediaSourceAvailable: hasMediaSource(),
    errorCode: error ? error.code : 0,
    errorMessage: error && error.message ? error.message : ""
  };
}

function postDiagnostic(event, extra = {}) {
  if (!state.session) {
    return;
  }

  post("playback_diagnostic", {
    deviceCode: state.session.deviceCode || "",
    playbackSessionId: state.session.playbackSessionId || "",
    protocol: state.session.protocol || "",
    preferredProtocol: state.session.preferredProtocol || "",
    protocolAttemptIndex: state.session.protocolAttemptIndex || 0,
    totalAttemptIndex: state.session.totalAttemptIndex || 0,
    maxTotalAttempts: state.session.maxTotalAttempts || 0,
    event,
    ...extra,
    snapshot: getVideoSnapshot()
  });
}

function setStatus(_text) {
}

function clearReadyTimer() {
  if (state.readyTimer) {
    window.clearTimeout(state.readyTimer);
    state.readyTimer = null;
  }
  state.readyCategory = null;
}

function createVideoElement() {
  const element = document.createElement("video");
  element.id = "player";
  element.autoplay = true;
  element.muted = true;
  element.playsInline = true;
  return element;
}

function replaceVideoElement() {
  const nextVideo = createVideoElement();
  if (video && video.parentNode === root) {
    root.replaceChild(nextVideo, video);
  } else {
    root.appendChild(nextVideo);
  }

  video = nextVideo;
  setActiveVideo(nextVideo);
  bindVideoEvents(video);
  return video;
}

function resetVideo() {
  if (!video) {
    return;
  }

  try {
    video.pause();
  } catch (_) {
  }

  try {
    video.removeAttribute("src");
  } catch (_) {
  }

  try {
    video.src = "";
  } catch (_) {
  }

  try {
    video.srcObject = null;
  } catch (_) {
  }

  try {
    video.load();
  } catch (_) {
  }
}

function teardownAdapter(reason) {
  clearReadyTimer();
  const session = state.session;
  let releaseStats = createReleaseStats(reason || "adapter_stop");

  if (state.adapter && typeof state.adapter.stop === "function") {
    try {
      releaseStats = state.adapter.stop() || releaseStats;
    } catch (_) {
    }
  }

  state.lastStopReason = reason || "adapter_stop";
  state.adapter = null;
  state.ready = false;
  state.requestId = null;
  state.readyCategory = null;
  resetWebRtcState();
  resetVideo();
  replaceVideoElement();
  if (session) {
    post("playback_stopped", {
      playbackSessionId: session.playbackSessionId || "",
      deviceCode: session.deviceCode || "",
      protocol: session.protocol || "",
      reason: releaseStats.reason,
      peerClosed: !!releaseStats.peerClosed,
      mediaTracksStopped: releaseStats.mediaTracksStopped || 0,
      flvPlayersDisposed: releaseStats.flvPlayersDisposed || 0,
      hlsPlayersDisposed: releaseStats.hlsPlayersDisposed || 0
    });
  }

  return releaseStats;
}

function stop(reason) {
  postDiagnostic("stop_requested", {
    reason: reason || "manual_stop"
  });
  teardownAdapter(reason || "manual_stop");
  state.session = null;
  setStatus("等待预览指令。");
  post("playback_idle");
}

function startReadyTimer(seconds, category, attemptId) {
  clearReadyTimer();
  state.readyCategory = category || "ready_timeout";
  postDiagnostic("ready_timer_started", {
    category: state.readyCategory,
    configuredSeconds: seconds || 0
  });
  state.readyTimer = window.setTimeout(() => {
    if (!state.ready && isCurrentAttempt(attemptId)) {
      postDiagnostic("ready_timer_fired", {
        category: state.readyCategory || category || "ready_timeout"
      });
      handleReadyTimeout(state.readyCategory || category || "ready_timeout", attemptId);
    }
  }, Math.max(4, seconds || 10) * 1000);
}

function getWebRtcReadySignal(trigger, snapshot) {
  if (snapshot.currentTime > 0) {
    return "current_time";
  }

  if (snapshot.videoWidth > 0 || snapshot.videoHeight > 0) {
    return "video_dimensions";
  }

  return trigger && webRtcReadyEvents.has(trigger)
    ? trigger
    : "";
}

function maybeMarkWebRtcReady(trigger, attemptId) {
  if (!isCurrentAttempt(attemptId) || state.ready || !state.session || state.session.protocol !== "webrtc") {
    return false;
  }

  const snapshot = getVideoSnapshot();
  const readySignal = getWebRtcReadySignal(trigger, snapshot);
  if (!readySignal) {
    postDiagnostic("webrtc_mark_ready_rejected", {
      trigger: trigger || "unknown",
      connectionState: state.webrtc.connectionState,
      iceConnectionState: state.webrtc.iceConnectionState,
      hasVideoTrack: state.webrtc.hasVideoTrack
    });
    return false;
  }

  if (!state.webrtc.firstFrameArrived) {
    state.webrtc.firstFrameArrived = true;
    postDiagnostic("webrtc_first_frame_arrived", {
      trigger: readySignal,
      connectionState: state.webrtc.connectionState,
      iceConnectionState: state.webrtc.iceConnectionState,
      hasVideoTrack: state.webrtc.hasVideoTrack
    });
  }

  markReady(attemptId, readySignal);
  return true;
}

function handleReadyTimeout(category, attemptId) {
  if (!isCurrentAttempt(attemptId) || state.ready) {
    return;
  }

  const effectiveCategory = category || "ready_timeout";
  if (state.session && state.session.protocol === "webrtc") {
    const snapshot = getVideoSnapshot();
    const connected = state.webrtc.connectionState === "connected"
      || state.webrtc.iceConnectionState === "connected"
      || state.webrtc.iceConnectionState === "completed";
    const noFirstFrame = !state.webrtc.firstFrameArrived
      && snapshot.videoWidth <= 0
      && snapshot.videoHeight <= 0
      && snapshot.currentTime <= 0;

    if (connected && state.webrtc.hasVideoTrack && noFirstFrame) {
      postDiagnostic("webrtc_black_screen_timeout", {
        category: effectiveCategory,
        connectionState: state.webrtc.connectionState,
        iceConnectionState: state.webrtc.iceConnectionState,
        hasVideoTrack: state.webrtc.hasVideoTrack
      });
      fail("webrtc_no_first_frame", "connected without first frame", attemptId);
      return;
    }
  }

  fail(effectiveCategory, "ready timeout", attemptId);
}

function markReady(attemptId, trigger) {
  if (!isCurrentAttempt(attemptId) || state.ready || !state.session) {
    return;
  }

  state.ready = true;
  clearReadyTimer();
  postDiagnostic("mark_ready", {
    trigger: trigger || ""
  });
  setStatus(state.session.protocol === "webrtc" ? "WebRTC 实时预览已连接。" : "备用预览已连接。");
  post("playback_ready", {
    deviceCode: state.session.deviceCode || "",
    playbackSessionId: state.session.playbackSessionId || "",
    protocol: state.session.protocol || ""
  });
}

function fail(category, reason, attemptId) {
  if (!isCurrentAttempt(attemptId)) {
    return;
  }

  const session = state.session;
  if (session) {
    postDiagnostic("playback_failed", {
      category,
      reason
    });
  }
  teardownAdapter("failure");
  state.session = null;

  setStatus(session && session.protocol === "webrtc" ? "WebRTC 预览连接失败。" : "备用预览连接失败。");
  post("playback_failed", {
    deviceCode: session && session.deviceCode ? session.deviceCode : "",
    playbackSessionId: session && session.playbackSessionId ? session.playbackSessionId : "",
    protocol: session && session.protocol ? session.protocol : "",
    category,
    reason
  });
}

function notifyHostInitialized(protocol) {
  if (!state.session) {
    return;
  }

  post("host_initialized", {
    deviceCode: state.session.deviceCode || "",
    playbackSessionId: state.session.playbackSessionId || "",
    protocol
  });
}

function waitForIceGatheringComplete(peer, timeoutMs) {
  if (peer.iceGatheringState === "complete") {
    return Promise.resolve();
  }

  return new Promise(resolve => {
    let isDone = false;
    const finish = () => {
      if (isDone) {
        return;
      }

      isDone = true;
      peer.removeEventListener("icegatheringstatechange", handleStateChange);
      if (timerId) {
        window.clearTimeout(timerId);
      }
      resolve();
    };

    const handleStateChange = () => {
      if (peer.iceGatheringState === "complete") {
        finish();
      }
    };

    const timerId = window.setTimeout(finish, timeoutMs);
    peer.addEventListener("icegatheringstatechange", handleStateChange);
  });
}

function isFallbackReady(attemptId) {
  if (!isCurrentAttempt(attemptId) || !video) {
    return false;
  }

  if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
    return true;
  }

  return video.readyState >= HTMLMediaElement.HAVE_METADATA
    && (
      video.videoWidth > 0
      || video.videoHeight > 0
      || video.currentTime > 0
      || video.duration === Infinity
    );
}

function maybeMarkFallbackReady(attemptId) {
  if (!isCurrentAttempt(attemptId) || !state.session || state.session.protocol === "webrtc") {
    return;
  }

  if (isFallbackReady(attemptId)) {
    markReady(attemptId);
  }
}

function bindVideoEvents(targetVideo) {
  if (!targetVideo) {
    return;
  }

  const attach = (eventName, handler) => {
    targetVideo.addEventListener(eventName, () => {
      if (targetVideo !== video) {
        return;
      }

      handler(getCurrentAttemptId());
    });
  };

  attach("loadedmetadata", attemptId => {
    postDiagnostic("video_loadedmetadata");
    if (state.session && state.session.protocol === "webrtc") {
      maybeMarkWebRtcReady("loadedmetadata", attemptId);
      return;
    }

    maybeMarkFallbackReady(attemptId);
  });

  attach("loadeddata", attemptId => {
    postDiagnostic("video_loadeddata");
    if (state.session && state.session.protocol === "webrtc") {
      maybeMarkWebRtcReady("loadeddata", attemptId);
      return;
    }

    maybeMarkFallbackReady(attemptId);
  });

  attach("canplay", attemptId => {
    postDiagnostic("video_canplay");
    if (state.session && state.session.protocol === "webrtc") {
      maybeMarkWebRtcReady("canplay", attemptId);
      return;
    }

    maybeMarkFallbackReady(attemptId);
  });

  attach("canplaythrough", attemptId => {
    postDiagnostic("video_canplaythrough");
    maybeMarkFallbackReady(attemptId);
  });

  attach("playing", attemptId => {
    postDiagnostic("video_playing");
    if (state.session && state.session.protocol === "webrtc") {
      maybeMarkWebRtcReady("playing", attemptId);
      return;
    }

    markReady(attemptId, "playing");
  });

  attach("waiting", () => {
    postDiagnostic("video_waiting");
  });

  attach("stalled", () => {
    postDiagnostic("video_stalled");
  });

  attach("suspend", () => {
    postDiagnostic("video_suspend");
  });

  attach("emptied", () => {
    postDiagnostic("video_emptied");
  });

  attach("error", attemptId => {
    postDiagnostic("video_error");
    if (state.session && !state.ready) {
      fail("media_error", "video error", attemptId);
    }
  });
}

function createWebRtcPlaybackHost(session, attemptId) {
  let peer = null;
  let mediaStream = null;
  let localRequestId = null;
  const isSessionActive = () => peer && state.session === session && isCurrentAttempt(attemptId);

  return {
    protocol: "webrtc",

    async start() {
      if (!session.webRtcApiUrl) {
        fail("webrtc_api_missing", "missing webrtc api url", attemptId);
        return;
      }

      postDiagnostic("webrtc_start");
      setStatus("WebRTC 预览连接中。");

      peer = new RTCPeerConnection({
        bundlePolicy: "max-bundle",
        rtcpMuxPolicy: "require"
      });
      mediaStream = new MediaStream();
      video.srcObject = mediaStream;
      state.ready = false;
      resetWebRtcState();

      peer.ontrack = event => {
        if (!isSessionActive()) {
          return;
        }

        mediaStream.addTrack(event.track);
        if (event.track && event.track.kind === "audio") {
          state.webrtc.hasAudioTrack = true;
        }

        if (event.track && event.track.kind === "video") {
          state.webrtc.hasVideoTrack = true;
        }

        postDiagnostic("webrtc_track", {
          kind: event.track ? event.track.kind : "unknown",
          hasVideoTrack: state.webrtc.hasVideoTrack
        });
        video.play().catch(() => {});
      };

      peer.onconnectionstatechange = () => {
        if (!isSessionActive()) {
          return;
        }

        state.webrtc.connectionState = peer.connectionState || "unknown";
        postDiagnostic("webrtc_connection_state", {
          connectionState: peer.connectionState
        });
        if (peer.connectionState === "connected") {
          video.play().catch(() => {});
          if (!maybeMarkWebRtcReady("connection_connected", attemptId)) {
            postDiagnostic("webrtc_connected_without_first_frame", {
              connectionState: state.webrtc.connectionState,
              iceConnectionState: state.webrtc.iceConnectionState,
              hasVideoTrack: state.webrtc.hasVideoTrack
            });
          }
          return;
        }

        if (!state.ready && ["failed", "disconnected", "closed"].includes(peer.connectionState)) {
          fail("webrtc_connection_failed", peer.connectionState, attemptId);
        }
      };

      peer.oniceconnectionstatechange = () => {
        if (!isSessionActive()) {
          return;
        }

        state.webrtc.iceConnectionState = peer.iceConnectionState || "unknown";
        postDiagnostic("webrtc_ice_state", {
          iceConnectionState: peer.iceConnectionState
        });
        if (!state.ready && ["failed", "disconnected", "closed"].includes(peer.iceConnectionState)) {
          fail("webrtc_ice_failed", peer.iceConnectionState, attemptId);
        }
      };

      peer.addTransceiver("audio", { direction: "recvonly" });
      peer.addTransceiver("video", { direction: "recvonly" });

      notifyHostInitialized("webrtc");

      if (session.forceInitialWebRtcFailure) {
        fail(
          session.forceFailureCategory || "acceptance_forced_webrtc_failure",
          session.forceFailureReason || "forced by preview acceptance",
          attemptId
        );
        return;
      }

      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);
      if (!isSessionActive()) {
        return;
      }

      await waitForIceGatheringComplete(peer, 1500);
      if (!isSessionActive()) {
        return;
      }

      if (!peer.localDescription || !peer.localDescription.sdp) {
        fail("webrtc_offer_missing", "missing local description", attemptId);
        return;
      }

      localRequestId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      state.requestId = localRequestId;
      postDiagnostic("webrtc_offer_posted", {
        requestId: localRequestId
      });
      startReadyTimer(session.readyTimeoutSeconds || 12, "webrtc_ready_timeout", attemptId);

      post("webrtc_offer", {
        requestId: localRequestId,
        deviceCode: session.deviceCode || "",
        playbackSessionId: session.playbackSessionId || "",
        protocol: "webrtc",
        apiUrl: session.webRtcApiUrl,
        streamUrl: session.sourceUrl,
        offerSdp: peer.localDescription.sdp
      });
    },

    async handleMessage(message) {
      if (!peer || !message || !message.type || !isSessionActive()) {
        return;
      }

      if (message.type === "webrtc_answer") {
        if (!message.payload || message.payload.requestId !== localRequestId) {
          return;
        }

        postDiagnostic("webrtc_answer_received", {
          requestId: localRequestId
        });
        try {
          await peer.setRemoteDescription({
            type: "answer",
            sdp: message.payload.answerSdp
          });
        } catch (_) {
          fail("webrtc_answer_invalid", "invalid answer", attemptId);
        }

        return;
      }

      if (message.type === "webrtc_answer_failed") {
        if (message.payload && message.payload.requestId === localRequestId) {
          postDiagnostic("webrtc_answer_failed", {
            requestId: localRequestId,
            reason: message.payload.reason || "webrtc negotiation failed"
          });
          fail("webrtc_answer_failed", message.payload.reason || "webrtc negotiation failed", attemptId);
        }
      }
    },

    stop() {
      const releaseStats = createReleaseStats("adapter_stop");
      if (peer) {
        try {
          peer.ontrack = null;
          peer.onconnectionstatechange = null;
          peer.oniceconnectionstatechange = null;
          peer.close();
          releaseStats.peerClosed = true;
        } catch (_) {
        }
      }

      if (mediaStream) {
        const tracks = mediaStream.getTracks();
        releaseStats.mediaTracksStopped = tracks.length;
        tracks.forEach(track => {
          try {
            track.stop();
          } catch (_) {
          }
        });
      }

      peer = null;
      mediaStream = null;
      localRequestId = null;
      return releaseStats;
    }
  };
}

function createMediaPlaybackHost(protocol, session, attemptId) {
  let cleanup = null;
  const isAttemptActive = () => state.session === session && isCurrentAttempt(attemptId);

  return {
    protocol,

    async start() {
      notifyHostInitialized(protocol);
      postDiagnostic("fallback_start", {
        sourceKind: protocol === "flv" ? "mpegts" : "hls",
        readyTimeoutSeconds: protocol === "flv"
          ? Math.max(18, session.readyTimeoutSeconds || 10)
          : Math.max(18, session.readyTimeoutSeconds || 10)
      });
      setStatus("正在建立备用预览。");

      if (protocol === "flv") {
        if (!isFlvJsSupported()) {
          fail("flv_not_supported", "mpegts.js unavailable", attemptId);
          return;
        }

        const player = executePlaybackStep("flv_create_player", attemptId, "flv_player_create_failed", () => window.mpegts.createPlayer({
          type: "flv",
          isLive: true,
          url: session.sourceUrl
        }));
        if (!isAttemptActive() || !player) {
          return;
        }

        postDiagnostic("flv_player_created");
        player.on(window.mpegts.Events.MEDIA_INFO, () => {
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("flv_media_info");
          trackPromiseRejection(
            executePlaybackStep("flv_media_info_play", attemptId, "flv_play_failed", () => video.play()),
            "flv_media_info_play_rejected",
            "flv_play_failed",
            attemptId
          );
          maybeMarkFallbackReady(attemptId);
        });
        player.on(window.mpegts.Events.METADATA_ARRIVED, () => {
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("flv_metadata_arrived");
          maybeMarkFallbackReady(attemptId);
        });
        player.on(window.mpegts.Events.STATISTICS_INFO, data => {
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("flv_statistics_info", {
            decodedFrames: data && typeof data.decodedFrames === "number" ? data.decodedFrames : 0,
            droppedFrames: data && typeof data.droppedFrames === "number" ? data.droppedFrames : 0
          });
          maybeMarkFallbackReady(attemptId);
        });
        executePlaybackStep("flv_attach_media", attemptId, "flv_attach_failed", () => player.attachMediaElement(video));
        if (!isAttemptActive()) {
          return;
        }

        postDiagnostic("flv_media_attached");
        executePlaybackStep("flv_load", attemptId, "flv_load_failed", () => player.load());
        if (!isAttemptActive()) {
          return;
        }

        postDiagnostic("flv_load_called");
        trackPromiseRejection(
          executePlaybackStep("flv_play", attemptId, "flv_play_failed", () => player.play()),
          "flv_play_rejected",
          "flv_play_failed",
          attemptId
        );
        player.on(window.mpegts.Events.ERROR, (_, detail) => {
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("flv_error", {
            detail: detail || "stream failed"
          });
          fail("flv_stream_failed", detail || "stream failed", attemptId);
        });
        cleanup = () => {
          try { player.pause(); } catch (_) {}
          try { player.unload(); } catch (_) {}
          try { player.detachMediaElement(); } catch (_) {}
          try { player.destroy(); } catch (_) {}
        };
        startReadyTimer(Math.max(18, session.readyTimeoutSeconds || 10), "flv_ready_timeout", attemptId);
        return;
      }

      if (protocol === "hls") {
        if (isHlsSupported()) {
          postDiagnostic("hls_js_selected");
          const hls = executePlaybackStep(
            "hls_create_instance",
            attemptId,
            "hls_instance_create_failed",
            () => new Hls({ liveDurationInfinity: true, enableWorker: true, autoStartLoad: false })
          );
          if (!isAttemptActive() || !hls) {
            return;
          }

          postDiagnostic("hls_instance_created");
          let attachCallbackReceived = false;
          let hlsPipelineStarted = false;
          let attachFallbackTimer = null;
          const clearAttachFallbackTimer = () => {
            if (attachFallbackTimer) {
              window.clearTimeout(attachFallbackTimer);
              attachFallbackTimer = null;
            }
          };
          const continueHlsStartup = trigger => {
            if (!isAttemptActive() || hlsPipelineStarted) {
              return;
            }

            hlsPipelineStarted = true;
            clearAttachFallbackTimer();
            postDiagnostic("hls_media_attached", {
              trigger,
              attachCallbackReceived,
              mediaAssigned: hls.media === video
            });
            executePlaybackStep("hls_load_source", attemptId, "hls_load_source_failed", () => hls.loadSource(session.sourceUrl));
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_load_source_called", {
              trigger,
              requestUrl: session.sourceUrl,
              requestKind: "manifest"
            });
            executePlaybackStep("hls_start_load", attemptId, "hls_start_load_failed", () => hls.startLoad(-1));
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_start_load_called", {
              trigger
            });
          };
          hls.on(Hls.Events.MEDIA_ATTACHED, () => {
            if (!isAttemptActive()) {
              return;
            }

            attachCallbackReceived = true;
            continueHlsStartup("media_attached_event");
          });
          hls.on(Hls.Events.MANIFEST_LOADING, (_, data) => {
            if (!isAttemptActive()) {
              return;
            }

            const requestUrl = data && data.url ? data.url : session.sourceUrl;
            postDiagnostic("hls_manifest_loading", {
              requestUrl,
              requestKind: "manifest"
            });
            postDiagnostic("hls_network_request_started", {
              requestUrl,
              requestKind: "manifest"
            });
          });
          hls.on(Hls.Events.LEVEL_LOADING, (_, data) => {
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_network_request_started", {
              requestUrl: data && data.url ? data.url : "",
              requestKind: "level"
            });
          });
          hls.on(Hls.Events.FRAG_LOADING, (_, data) => {
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_network_request_started", {
              requestUrl: data && data.frag && data.frag.url ? data.frag.url : "",
              requestKind: "fragment"
            });
          });
          hls.on(Hls.Events.ERROR, (_, data) => {
            if (!isAttemptActive()) {
              return;
            }

            const requestUrl = data && data.context && data.context.url
              ? data.context.url
              : data && data.frag && data.frag.url
                ? data.frag.url
                : data && data.url
                  ? data.url
                  : "";
            postDiagnostic("hls_error", {
              fatal: !!(data && data.fatal),
              detail: data && data.details ? data.details : "stream failed"
            });
            postDiagnostic("hls_network_request_failed", {
              requestUrl,
              requestKind: data && data.type ? data.type : "",
              fatal: !!(data && data.fatal),
              detail: data && data.details ? data.details : "stream failed"
            });
            if (data && data.fatal) {
              fail("hls_stream_failed", data.details || "stream failed", attemptId);
            }
          });
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_manifest_parsed");
            trackPromiseRejection(
              executePlaybackStep("hls_manifest_play", attemptId, "hls_play_failed", () => video.play()),
              "hls_play_rejected",
              "hls_play_failed",
              attemptId
            );
            maybeMarkFallbackReady(attemptId);
          });
          hls.on(Hls.Events.LEVEL_LOADED, (_, data) => {
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_level_loaded", {
              fragments: data && data.details && Array.isArray(data.details.fragments) ? data.details.fragments.length : 0
            });
            maybeMarkFallbackReady(attemptId);
          });
          hls.on(Hls.Events.FRAG_BUFFERED, () => {
            if (!isAttemptActive()) {
              return;
            }

            postDiagnostic("hls_frag_buffered");
            maybeMarkFallbackReady(attemptId);
          });
          postDiagnostic("hls_attach_media_called", {
            mediaAssigned: hls.media === video
          });
          executePlaybackStep("hls_attach_media", attemptId, "hls_attach_failed", () => hls.attachMedia(video));
          if (!isAttemptActive()) {
            return;
          }

          attachFallbackTimer = window.setTimeout(() => {
            if (!isAttemptActive() || hlsPipelineStarted) {
              return;
            }

            postDiagnostic("hls_no_attach_callback", {
              mediaAssigned: hls.media === video,
              videoIsConnected: !!(video && video.isConnected)
            });
            continueHlsStartup("attach_callback_missing");
          }, 300);
          cleanup = () => {
            clearAttachFallbackTimer();
            try { hls.destroy(); } catch (_) {}
          };
          startReadyTimer(Math.max(18, session.readyTimeoutSeconds || 10), "hls_ready_timeout", attemptId);
          return;
        }

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          postDiagnostic("hls_native_fallback_selected");
          executePlaybackStep("hls_native_set_src", attemptId, "hls_native_src_failed", () => {
            video.src = session.sourceUrl;
          });
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("hls_native_src_set");
          executePlaybackStep("hls_native_load", attemptId, "hls_native_load_failed", () => video.load());
          if (!isAttemptActive()) {
            return;
          }

          postDiagnostic("hls_native_load_called");
          trackPromiseRejection(
            executePlaybackStep("hls_native_play", attemptId, "hls_play_failed", () => video.play()),
            "hls_native_play_rejected",
            "hls_play_failed",
            attemptId
          );
          cleanup = () => resetVideo();
          startReadyTimer(Math.max(18, session.readyTimeoutSeconds || 10), "hls_ready_timeout", attemptId);
          return;
        }

        fail("hls_not_supported", "hls.js unavailable", attemptId);
        return;
      }

      fail("unsupported_protocol", protocol, attemptId);
    },

    async handleMessage() {
    },

    stop() {
      const releaseStats = createReleaseStats("adapter_stop");
      if (cleanup) {
        try {
          cleanup();
        } catch (_) {
        }
      }

      if (protocol === "flv") {
        releaseStats.flvPlayersDisposed = 1;
      } else if (protocol === "hls") {
        releaseStats.hlsPlayersDisposed = 1;
      }

      cleanup = null;
      return releaseStats;
    }
  };
}

function createPlaybackHost(session, attemptId) {
  if (session.protocol === "webrtc") {
    return createWebRtcPlaybackHost(session, attemptId);
  }

  if (session.protocol === "flv" || session.protocol === "hls") {
    return createMediaPlaybackHost(session.protocol, session, attemptId);
  }

  return null;
}

async function play(session) {
  const previousSession = state.session;
  if (previousSession) {
    postDiagnostic("switch_session_requested", {
      reason: "switch_session",
      oldSessionId: previousSession.playbackSessionId || "",
      newSessionId: session && session.playbackSessionId ? session.playbackSessionId : "",
      oldProtocol: previousSession.protocol || "",
      newProtocol: session && session.protocol ? session.protocol : ""
    });
  }
  stop("switch_session");

  if (!session || !session.protocol) {
    return;
  }

  state.playbackAttemptId += 1;
  const attemptId = state.playbackAttemptId;
  state.session = session;
  state.ready = false;
  video.muted = true;
  postDiagnostic("play_invoked", {
    readyTimeoutSeconds: session.readyTimeoutSeconds || 0
  });

  if (state.pageMode === "fallback-only" && session.protocol === "webrtc") {
    postDiagnostic("fallback_only_webrtc_rejected");
    fail("fallback_only_mode_rejects_webrtc", "fallback-only page rejected webrtc startup", attemptId);
    return;
  }

  if (session.protocol === "h5") {
    window.location.href = session.sourceUrl;
    return;
  }

  const adapter = createPlaybackHost(session, attemptId);
  if (!adapter) {
    fail("unsupported_protocol", session.protocol, attemptId);
    return;
  }

  state.adapter = adapter;

  try {
    await adapter.start();
  } catch (error) {
    fail("host_start_failed", error && error.message ? error.message : String(error), attemptId);
  }
}

bindVideoEvents(video);

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener("message", async event => {
    if (!state.adapter || typeof state.adapter.handleMessage !== "function") {
      return;
    }

    try {
      await state.adapter.handleMessage(event.data || {});
    } catch (error) {
      fail("host_message_failed", error && error.message ? error.message : String(error), getCurrentAttemptId());
    }
  });
}

window.addEventListener("beforeunload", () => stop("before_unload"));

window.TyslPreviewHost = {
  play,
  stop
};

post("host_ready", {
  pageMode: state.pageMode,
  fallbackProtocolHint: state.fallbackProtocolHint,
  hlsSupported: isHlsSupported(),
  flvjsSupported: isFlvJsSupported(),
  mediaSourceAvailable: hasMediaSource()
});
</script>
</body>
</html>
